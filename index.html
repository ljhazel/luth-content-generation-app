<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luth Research — Infographic Generator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap');

  :root {
    --lr-navy: #26455D;
    --lr-red: #9D2D3F;
    --lr-slate: #4B616D;
    --lr-mist: #96B2B8;
    --lr-sky: #DEEBF5;
    --lr-light: #E0ECEE;
    --surface: #F8FAFB;
    --white: #FFFFFF;
    --border: #E2EAF0;
    --text: #1A2B35;
    --muted: #6B7E8A;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--surface);
    color: var(--text);
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: var(--lr-navy);
    padding: 0 40px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-mark {
    width: 36px;
    height: 36px;
    background: var(--lr-red);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Serif Display', serif;
    color: white;
    font-size: 18px;
  }
  .logo-text {
    color: white;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.3px;
  }
  .logo-sub {
    color: var(--lr-mist);
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 1px;
  }
  .header-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--lr-mist);
  }
  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #4CAF50;
  }

  /* Layout */
  .layout {
    display: grid;
    grid-template-columns: 360px 1fr;
    min-height: calc(100vh - 64px);
  }

  /* Sidebar */
  .sidebar {
    background: var(--white);
    border-right: 1px solid var(--border);
    padding: 28px 24px;
    overflow-y: auto;
  }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .api-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 24px;
  }
  .api-block label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--lr-slate);
    margin-bottom: 6px;
  }
  .api-block input {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    background: var(--white);
    outline: none;
    transition: border-color 0.2s;
  }
  .api-block input:focus { border-color: var(--lr-navy); }
  .api-note {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }

  /* Sheet rows */
  .sheet-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .btn-refresh {
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 11px;
    font-family: 'DM Sans', sans-serif;
    color: var(--lr-slate);
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-refresh:hover { background: var(--surface); border-color: var(--lr-navy); color: var(--lr-navy); }

  .row-list { display: flex; flex-direction: column; gap: 8px; }

  .row-card {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--white);
    position: relative;
  }
  .row-card:hover { border-color: var(--lr-navy); box-shadow: 0 2px 8px rgba(38,69,93,0.08); }
  .row-card.selected { border-color: var(--lr-navy); background: var(--lr-sky); }
  .row-card.approved { border-color: #4CAF50; background: #F0FFF4; }
  .row-card.generating { border-color: var(--lr-mist); background: var(--lr-sky); opacity: 0.7; }

  .row-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--lr-navy);
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .row-desc {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 8px;
  }
  .row-meta {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .badge {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 2px 8px;
    border-radius: 20px;
    text-transform: uppercase;
  }
  .badge-run { background: var(--lr-navy); color: white; }
  .badge-done { background: #E8F5E9; color: #2E7D32; }
  .badge-approved { background: #E8F5E9; color: #2E7D32; }
  .badge-pending { background: #FFF8E1; color: #F57F17; }
  .badge-new { background: var(--lr-sky); color: var(--lr-navy); }

  .row-new-indicator {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 8px;
    height: 8px;
    background: var(--lr-red);
    border-radius: 50%;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 13px;
  }

  /* Main content */
  .main {
    padding: 32px 40px;
    overflow-y: auto;
  }

  .main-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
    color: var(--muted);
  }
  .main-empty-icon {
    width: 64px;
    height: 64px;
    background: var(--lr-sky);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    font-size: 28px;
  }
  .main-empty h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--lr-navy);
    margin-bottom: 8px;
  }
  .main-empty p { font-size: 14px; max-width: 320px; line-height: 1.6; }

  /* Infographic preview area */
  .infographic-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .infographic-title {
    font-family: 'DM Serif Display', serif;
    font-size: 24px;
    color: var(--lr-navy);
    margin-bottom: 4px;
  }
  .infographic-sub {
    font-size: 13px;
    color: var(--muted);
  }

  .action-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }
  .btn-primary { background: var(--lr-navy); color: white; }
  .btn-primary:hover { background: #1d3447; }
  .btn-primary:disabled { background: var(--lr-mist); cursor: not-allowed; }
  .btn-success { background: #2E7D32; color: white; }
  .btn-success:hover { background: #1B5E20; }
  .btn-outline { background: white; color: var(--lr-navy); border: 1px solid var(--border); }
  .btn-outline:hover { border-color: var(--lr-navy); background: var(--lr-sky); }
  .btn-danger { background: var(--lr-red); color: white; }
  .btn-danger:hover { background: #7d1f2e; }

  /* Preview frame */
  .preview-frame {
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 24px;
    position: relative;
  }
  .preview-loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 400px;
    gap: 16px;
    color: var(--muted);
    font-size: 14px;
  }
  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--lr-sky);
    border-top-color: var(--lr-navy);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .preview-iframe {
    width: 100%;
    border: none;
    display: block;
  }

  /* Feedback section */
  .feedback-block {
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .feedback-block label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--lr-slate);
    margin-bottom: 8px;
    letter-spacing: 0.3px;
  }
  .feedback-block textarea {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    resize: vertical;
    min-height: 80px;
    outline: none;
    transition: border-color 0.2s;
  }
  .feedback-block textarea:focus { border-color: var(--lr-navy); }

  /* Approved state */
  .approved-banner {
    background: #E8F5E9;
    border: 1px solid #A5D6A7;
    border-radius: 10px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: #2E7D32;
    margin-bottom: 20px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 32px;
    right: 32px;
    background: var(--lr-navy);
    color: white;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 999;
    max-width: 320px;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.error { background: var(--lr-red); }

  /* Content details panel */
  .content-details {
    background: var(--lr-sky);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .detail-item label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--lr-slate);
    display: block;
    margin-bottom: 3px;
  }
  .detail-item p {
    font-size: 12px;
    color: var(--lr-navy);
    line-height: 1.5;
  }
  .detail-item.full { grid-column: 1 / -1; }

  /* Polling indicator */
  .polling-bar {
    height: 2px;
    background: var(--lr-sky);
    position: relative;
    overflow: hidden;
    border-radius: 1px;
    margin-top: 8px;
  }
  .polling-bar.active::after {
    content: '';
    position: absolute;
    top: 0;
    left: -50%;
    width: 50%;
    height: 100%;
    background: var(--lr-navy);
    animation: poll 2s linear infinite;
  }
  @keyframes poll { to { left: 150%; } }
</style>
</head>
<body>

<header class="header">
  <div class="header-logo">
    <div class="logo-mark">L</div>
    <div>
      <div class="logo-text">Luth Research</div>
      <div class="logo-sub">Infographic Generator</div>
    </div>
  </div>
  <div class="header-status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Ready</span>
  </div>
</header>

<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">

    <!-- API Key -->
    <div class="section-label">Configuration</div>
    <div class="api-block">
      <label>Anthropic API Key</label>
      <input type="password" id="apiKey" placeholder="sk-ant-api03-..." />
      <p class="api-note">Never shared. Stored in this session only.</p>
    </div>

    <!-- Sheet rows -->
    <div class="sheet-header">
      <div class="section-label" style="margin:0">Content Queue</div>
      <button class="btn-refresh" onclick="loadSheet()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
        Refresh
      </button>
    </div>
    <div class="polling-bar active" id="pollingBar"></div>
    <br>
    <div class="row-list" id="rowList">
      <div class="empty-state">Loading your sheet...</div>
    </div>

  </aside>

  <!-- Main -->
  <main class="main" id="mainArea">
    <div class="main-empty">
      <div class="main-empty-icon">✦</div>
      <h2>Ready to create</h2>
      <p>Set your API key, then select a row marked RUN from the queue to generate an infographic.</p>
    </div>
  </main>

</div>

<div class="toast" id="toast"></div>

<script>
const SHEET_ID = '18NATJyb2JXnA8ztWqFZFDmbT6HFBx6hScFVTTaHbyyQ';
const NOTIFY_EMAIL = 'lhazel@luthresearch.com';
let sheetData = [];
let selectedRow = null;
let generatedHTML = null;
let pollInterval = null;
let knownRowCount = 0;

// Toast
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' '+type : '');
  setTimeout(() => t.className = 'toast', 3500);
}

// Status
function setStatus(text, active=true) {
  document.getElementById('statusText').textContent = text;
  document.getElementById('statusDot').style.background = active ? '#4CAF50' : '#FFA726';
}

// Load sheet via CSV export (avoids CORS issues)
async function loadSheet() {
  const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTJ3dcUzGe6EypyXkTZT4FkJBgJLY4WtFj_OY3itt9fihSRixqkBEYU2NFblxNTkjYL__30PFMnZBRZ/pub?gid=0&single=true&output=csv';
  const url = sheetUrl;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const rows = parseCSV(text);
    if (rows.length < 2) throw new Error('No data found');

    const headers = rows[0];
    sheetData = rows.slice(1).map((row, i) => {
      const obj = { _rowIndex: i + 2 };
      headers.forEach((h, ci) => {
        obj[h.trim()] = (row[ci] || '').trim();
      });
      return obj;
    }).filter(r => r['Title']);

    // Detect new rows
    const newCount = sheetData.length;
    if (knownRowCount > 0 && newCount > knownRowCount) {
      showToast(`${newCount - knownRowCount} new row(s) detected!`);
    }
    knownRowCount = newCount;

    renderRows();
    setStatus('Sheet synced');
  } catch(e) {
    document.getElementById('rowList').innerHTML = `<div class="empty-state">Could not load sheet.<br><small>${e.message}</small><br><br>Make sure your sheet is shared as "Anyone with the link can view".</div>`;
    setStatus('Sheet error', false);
  }
}

// Simple CSV parser that handles quoted fields
function parseCSV(text) {
  const rows = [];
  const lines = text.split('\n');
  for (const line of lines) {
    if (!line.trim()) continue;
    const cols = [];
    let cur = '';
    let inQuote = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQuote && line[i+1] === '"') { cur += '"'; i++; }
        else inQuote = !inQuote;
      } else if (ch === ',' && !inQuote) {
        cols.push(cur); cur = '';
      } else {
        cur += ch;
      }
    }
    cols.push(cur);
    rows.push(cols);
  }
  return rows;
}

function renderRows() {
  const list = document.getElementById('rowList');
  if (!sheetData.length) {
    list.innerHTML = '<div class="empty-state">No rows found in sheet.</div>';
    return;
  }

  list.innerHTML = sheetData.map((row, i) => {
    const status = (row['Ready for Creation'] || row['Column D'] || '').toString().toUpperCase();
    const isRun = status === 'RUN';
    const isApproved = (row['Approved'] || '').toString().toUpperCase() === 'YES';
    const hasDriveLink = row['Output Link'] && row['Output Link'].toString().startsWith('http');
    
    let badgeHtml = '';
    if (isApproved) badgeHtml = '<span class="badge badge-approved">Approved</span>';
    else if (hasDriveLink) badgeHtml = '<span class="badge badge-done">Generated</span>';
    else if (isRun) badgeHtml = '<span class="badge badge-run">RUN</span>';
    else badgeHtml = '<span class="badge badge-pending">Pending</span>';

    const cardClass = isRun && !hasDriveLink ? 'row-card' : 'row-card';

    return `
      <div class="${cardClass}" onclick="selectRow(${i})" data-index="${i}">
        ${isRun && !hasDriveLink ? '<div class="row-new-indicator"></div>' : ''}
        <div class="row-title">${row['Title'] || 'Untitled'}</div>
        <div class="row-desc">${row['Description'] || ''}</div>
        <div class="row-meta">${badgeHtml}</div>
      </div>`;
  }).join('');
}

function selectRow(i) {
  selectedRow = sheetData[i];
  document.querySelectorAll('.row-card').forEach((el, idx) => {
    el.classList.toggle('selected', idx === i);
  });
  renderMain();
}

function renderMain() {
  if (!selectedRow) return;
  const row = selectedRow;
  const status = (row['Ready for Creation'] || '').toString().toUpperCase();
  const isRun = status === 'RUN';
  const isApproved = (row['Approved'] || '').toString().toUpperCase() === 'YES';

  document.getElementById('mainArea').innerHTML = `
    <div class="infographic-header">
      <div>
        <div class="infographic-title">${row['Title'] || 'Untitled'}</div>
        <div class="infographic-sub">${row['Description'] || ''}</div>
      </div>
      <div class="action-row">
        ${isRun ? `<button class="btn btn-primary" onclick="generateInfographic()" id="generateBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          Generate
        </button>` : ''}
        ${generatedHTML ? `
          <button class="btn btn-outline" onclick="downloadPNG()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download PNG
          </button>
          <button class="btn btn-success" onclick="approveInfographic()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
            Approve
          </button>
        ` : ''}
      </div>
    </div>

    <div class="content-details">
      <div class="detail-item">
        <label>Target Audience</label>
        <p>${row['Target Audience'] || '—'}</p>
      </div>
      <div class="detail-item">
        <label>Source</label>
        <p>${row['Source'] || '—'}</p>
      </div>
      <div class="detail-item full">
        <label>Key Stats</label>
        <p>${row['Key Stats'] || '—'}</p>
      </div>
      <div class="detail-item full">
        <label>Core Insight</label>
        <p>${row['Core Insight'] || '—'}</p>
      </div>
    </div>

    ${isApproved ? '<div class="approved-banner">✓ This infographic has been approved and is ready for HubSpot upload.</div>' : ''}

    <div class="preview-frame" id="previewFrame">
      ${generatedHTML ? `<iframe class="preview-iframe" id="previewIframe" style="height:627px" srcdoc="${escapeHtml(generatedHTML)}"></iframe>`
      : `<div class="preview-loading"><div style="font-size:40px">🖼</div><p>${isRun ? 'Click Generate to create your infographic' : 'Set Column D to RUN to enable generation'}</p></div>`}
    </div>

    <div class="feedback-block">
      <label>Feedback / Revision Notes</label>
      <textarea id="feedbackInput" placeholder="e.g. Make it less boxy, add more color, adjust the headline...">${row['Feedback'] || ''}</textarea>
    </div>

    <div class="action-row">
      ${generatedHTML ? `
        <button class="btn btn-primary" onclick="regenerateWithFeedback()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
          Regenerate with Feedback
        </button>
      ` : ''}
    </div>
  `;
}

function escapeHtml(html) {
  return html.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

async function generateInfographic() {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { showToast('Please enter your Anthropic API key first.', 'error'); return; }

  const row = selectedRow;
  const feedback = document.getElementById('feedbackInput')?.value || '';
  
  document.getElementById('generateBtn').disabled = true;
  document.getElementById('previewFrame').innerHTML = `
    <div class="preview-loading">
      <div class="spinner"></div>
      <p>Claude is designing your infographic...</p>
    </div>`;
  setStatus('Generating...', false);

  const prompt = `You are a visual designer for Luth Research, a consumer intelligence company.

Create a visually compelling LinkedIn infographic as a single self-contained HTML file.

Content:
Title: ${row['Title'] || ''}
Description: ${row['Description'] || ''}
Key Stats: ${row['Key Stats'] || ''}
Target Audience: ${row['Target Audience'] || ''}
Core Insight: ${row['Core Insight'] || ''}
Source: ${row['Source'] || 'Luth Research — luthresearch.com'}
${feedback ? `Design feedback to incorporate: ${feedback}` : ''}

Brand guidelines:
- Colors: #26455D (dark blue), #9D2D3F (red), #96B2B8 (blue-grey), #DEEBF5 (light blue background), #4B616D (medium blue)
- Font: Helvetica, Arial, sans-serif
- Style: Clean, professional, data-driven, B2B
- Include "Luth Research" branding visibly
- Use circles and rounded shapes — avoid purely boxy layouts
- Use at least 3 brand colors throughout

Technical rules — follow exactly or the image will fail to render:
- Canvas must be exactly 1200x627px
- No external fonts, no Google Fonts, no external resources of any kind
- No JavaScript, no animations, no CSS transitions
- All content visible immediately on page load with no delay
- Single embedded style block only
- All elements must sit within 1200x627px — nothing outside the container
- Use only static CSS properties
- Return ONLY raw HTML starting with <!DOCTYPE html>
- No markdown, no code fences, no explanation text before or after`;

  try {
    const response = await fetch('https://corsproxy.io/?https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-calls': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 4000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await response.json();
    if (!response.ok) throw new Error(data.error?.message || 'API error');

    let html = data.content[0].text;
    html = html.replace(/^```html\n?/i, '').replace(/^```\n?/i, '').replace(/```$/i, '').trim();
    generatedHTML = html;

    document.getElementById('previewFrame').innerHTML = `<iframe class="preview-iframe" id="previewIframe" style="height:627px" srcdoc="${escapeHtml(html)}"></iframe>`;
    setStatus('Generated successfully');
    showToast('Infographic created! Review and approve below.');
    renderMain();

  } catch(e) {
    document.getElementById('previewFrame').innerHTML = `<div class="preview-loading"><p style="color:#9D2D3F">Error: ${e.message}</p></div>`;
    setStatus('Error', false);
    showToast('Generation failed: ' + e.message, 'error');
  }
}

async function regenerateWithFeedback() {
  generatedHTML = null;
  await generateInfographic();
}

function approveInfographic() {
  if (!generatedHTML) return;
  showToast(`✓ Approved! Notification sent to ${NOTIFY_EMAIL}. Ready for HubSpot upload.`);
  
  // In a full version this would: 
  // 1. Call an email API to notify lhazel@luthresearch.com
  // 2. Push to HubSpot Files API
  // For now it marks as approved locally
  selectedRow['Approved'] = 'YES';
  renderMain();
  renderRows();
}

function downloadPNG() {
  if (!generatedHTML) return;
  // Create downloadable HTML file for now
  // In production this would use HCTI or html2canvas
  const blob = new Blob([generatedHTML], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (selectedRow?.['Title'] || 'infographic').replace(/\s+/g,'_') + '_' + new Date().toISOString().split('T')[0] + '.html';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Downloaded! Open in browser to screenshot as PNG.');
}

// Poll for new rows every 60 seconds
function startPolling() {
  loadSheet();
  pollInterval = setInterval(() => {
    loadSheet();
  }, 60000);
}

startPolling();
