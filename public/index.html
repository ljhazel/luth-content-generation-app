<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luth Research — Infographic Generator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap');

  :root {
    --lr-navy: #26455D;
    --lr-red: #9D2D3F;
    --lr-slate: #4B616D;
    --lr-mist: #96B2B8;
    --lr-sky: #DEEBF5;
    --lr-light: #E0ECEE;
    --surface: #F8FAFB;
    --white: #FFFFFF;
    --border: #E2EAF0;
    --text: #1A2B35;
    --muted: #6B7E8A;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--surface);
    color: var(--text);
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: var(--lr-navy);
    padding: 0 40px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-mark {
    width: 36px;
    height: 36px;
    background: var(--lr-red);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Serif Display', serif;
    color: white;
    font-size: 18px;
  }
  .logo-text {
    color: white;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.3px;
  }
  .logo-sub {
    color: var(--lr-mist);
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 1px;
  }
  .header-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--lr-mist);
  }
  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #4CAF50;
  }

  /* Layout */
  .layout {
    display: grid;
    grid-template-columns: 360px 1fr;
    min-height: calc(100vh - 64px);
  }

  /* Sidebar */
  .sidebar {
    background: var(--white);
    border-right: 1px solid var(--border);
    padding: 28px 24px;
    overflow-y: auto;
  }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .api-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 24px;
  }
  .api-block label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--lr-slate);
    margin-bottom: 6px;
  }
  .api-block input {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    background: var(--white);
    outline: none;
    transition: border-color 0.2s;
  }
  .api-block input:focus { border-color: var(--lr-navy); }
  .api-note {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }

  /* Sheet rows */
  .sheet-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .btn-refresh {
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 11px;
    font-family: 'DM Sans', sans-serif;
    color: var(--lr-slate);
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-refresh:hover { background: var(--surface); border-color: var(--lr-navy); color: var(--lr-navy); }

  .row-list { display: flex; flex-direction: column; gap: 8px; }

  .row-card {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--white);
    position: relative;
  }
  .row-card:hover { border-color: var(--lr-navy); box-shadow: 0 2px 8px rgba(38,69,93,0.08); }
  .row-card.selected { border-color: var(--lr-navy); background: var(--lr-sky); }
  .row-card.approved { border-color: #4CAF50; background: #F0FFF4; }
  .row-card.generating { border-color: var(--lr-mist); background: var(--lr-sky); opacity: 0.7; }

  .row-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--lr-navy);
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .row-desc {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 8px;
  }
  .row-meta {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .badge {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 2px 8px;
    border-radius: 20px;
    text-transform: uppercase;
  }
  .badge-run { background: var(--lr-navy); color: white; }
  .badge-done { background: #E8F5E9; color: #2E7D32; }
  .badge-approved { background: #E8F5E9; color: #2E7D32; }
  .badge-pending { background: #FFF8E1; color: #F57F17; }
  .badge-new { background: var(--lr-sky); color: var(--lr-navy); }

  .row-new-indicator {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 8px;
    height: 8px;
    background: var(--lr-red);
    border-radius: 50%;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 13px;
  }

  /* Main content */
  .main {
    padding: 32px 40px;
    overflow-y: auto;
  }

  .main-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
    color: var(--muted);
  }
  .main-empty-icon {
    width: 64px;
    height: 64px;
    background: var(--lr-sky);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    font-size: 28px;
  }
  .main-empty h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--lr-navy);
    margin-bottom: 8px;
  }
  .main-empty p { font-size: 14px; max-width: 320px; line-height: 1.6; }

  /* Infographic preview area */
  .infographic-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .infographic-title {
    font-family: 'DM Serif Display', serif;
    font-size: 24px;
    color: var(--lr-navy);
    margin-bottom: 4px;
  }
  .infographic-sub {
    font-size: 13px;
    color: var(--muted);
  }

  .action-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }
  .btn-primary { background: var(--lr-navy); color: white; }
  .btn-primary:hover { background: #1d3447; }
  .btn-primary:disabled { background: var(--lr-mist); cursor: not-allowed; }
  .btn-success { background: #2E7D32; color: white; }
  .btn-success:hover { background: #1B5E20; }
  .btn-outline { background: white; color: var(--lr-navy); border: 1px solid var(--border); }
  .btn-outline:hover { border-color: var(--lr-navy); background: var(--lr-sky); }
  .btn-danger { background: var(--lr-red); color: white; }
  .btn-danger:hover { background: #7d1f2e; }

  /* Preview frame */
  .preview-frame {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 24px;
    position: relative;
    width: 100%;
    aspect-ratio: 1200 / 627;
  }

  .preview-frame iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 1200px;
    height: 627px;
    border: none;
    transform-origin: top left;
    transform: scale(var(--preview-scale, 0.7));
  }
  .preview-loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 400px;
    gap: 16px;
    color: var(--muted);
    font-size: 14px;
  }
  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--lr-sky);
    border-top-color: var(--lr-navy);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .preview-iframe {
    width: 100%;
    border: none;
    display: block;
  }

  /* Feedback section */
  .feedback-block {
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .feedback-block label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--lr-slate);
    margin-bottom: 8px;
    letter-spacing: 0.3px;
  }
  .feedback-block textarea {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    resize: vertical;
    min-height: 80px;
    outline: none;
    transition: border-color 0.2s;
  }
  .feedback-block textarea:focus { border-color: var(--lr-navy); }

  /* Approved state */
  .approved-banner {
    background: #E8F5E9;
    border: 1px solid #A5D6A7;
    border-radius: 10px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: #2E7D32;
    margin-bottom: 20px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 32px;
    right: 32px;
    background: var(--lr-navy);
    color: white;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 999;
    max-width: 320px;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.error { background: var(--lr-red); }

  /* Content details panel */
  .content-details {
    background: var(--lr-sky);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .detail-item label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--lr-slate);
    display: block;
    margin-bottom: 3px;
  }
  .detail-item p {
    font-size: 12px;
    color: var(--lr-navy);
    line-height: 1.5;
  }
  .detail-item.full { grid-column: 1 / -1; }

  /* Polling indicator */
  .polling-bar {
    height: 2px;
    background: var(--lr-sky);
    position: relative;
    overflow: hidden;
    border-radius: 1px;
    margin-top: 8px;
  }
  .polling-bar.active::after {
    content: '';
    position: absolute;
    top: 0;
    left: -50%;
    width: 50%;
    height: 100%;
    background: var(--lr-navy);
    animation: poll 2s linear infinite;
  }
  @keyframes poll { to { left: 150%; } }

  /* Chat interface */
  .main-with-chat {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 0;
    height: calc(100vh - 64px);
    overflow: hidden;
    position: fixed;
    top: 64px;
    left: 360px;
    right: 0;
    bottom: 0;
  }

  .preview-panel {
    padding: 28px 32px;
    overflow-y: auto;
    border-right: 1px solid var(--border);
    height: 100%;
  }

  .chat-panel {
    display: flex;
    flex-direction: column;
    background: var(--white);
    height: 100%;
    max-height: calc(100vh - 64px);
    overflow: hidden;
  }

  .chat-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .chat-header-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--lr-navy);
  }

  .chat-version-count {
    font-size: 11px;
    color: var(--muted);
    background: var(--surface);
    padding: 2px 8px;
    border-radius: 10px;
    border: 1px solid var(--border);
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: 0;
  }

  .chat-msg {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .chat-msg-user {
    align-items: flex-end;
  }

  .chat-msg-claude {
    align-items: flex-start;
  }

  .chat-bubble {
    max-width: 85%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 12px;
    line-height: 1.5;
  }

  .chat-bubble-user {
    background: var(--lr-navy);
    color: white;
    border-bottom-right-radius: 4px;
  }

  .chat-bubble-claude {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .chat-bubble-thinking {
    background: var(--lr-sky);
    color: var(--lr-slate);
    border: 1px solid var(--lr-mist);
    font-style: italic;
  }

  .chat-msg-meta {
    font-size: 10px;
    color: var(--muted);
    padding: 0 4px;
  }

  .chat-version-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--lr-sky);
    border: 1px solid var(--lr-mist);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 11px;
    color: var(--lr-navy);
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 4px;
  }

  .chat-version-pill:hover {
    background: var(--lr-navy);
    color: white;
    border-color: var(--lr-navy);
  }

  .chat-version-pill.active {
    background: var(--lr-navy);
    color: white;
    border-color: var(--lr-navy);
  }

  .chat-input-area {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    background: var(--white);
  }

  .chat-input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    width: 100%;
  }

  .chat-textarea {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    resize: none;
    min-height: 100px;
    max-height: 200px;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.6;
  }

  .chat-textarea:focus { border-color: var(--lr-navy); }

  .chat-send-btn {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    background: var(--lr-navy);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s;
  }

  .chat-send-btn:hover { background: #1d3447; }
  .chat-send-btn:disabled { background: var(--lr-mist); cursor: not-allowed; }

  .chat-hint {
    font-size: 10px;
    color: var(--muted);
    margin-top: 6px;
  }

  .chat-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
    padding: 24px;
    color: var(--muted);
    gap: 8px;
  }

  .chat-empty-icon {
    font-size: 28px;
    margin-bottom: 4px;
  }

  .chat-empty-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--lr-navy);
  }

  .chat-empty-sub {
    font-size: 12px;
    line-height: 1.5;
    max-width: 240px;
  }

  /* Version navigation in preview */
  .version-nav {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
  }

  .version-nav-label {
    font-size: 11px;
    color: var(--muted);
    font-weight: 500;
  }

  .version-chips {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .version-chip {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--white);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .version-chip:hover { border-color: var(--lr-navy); color: var(--lr-navy); }
  .version-chip.active { background: var(--lr-navy); color: white; border-color: var(--lr-navy); }

  .typing-indicator {
    display: flex;
    gap: 4px;
    padding: 8px 4px;
  }

  .typing-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--lr-mist);
    animation: typingBounce 1.2s infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }


  /* Content History */
  .history-section {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .history-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .history-card {
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--white);
  }

  .history-card:hover {
    border-color: var(--lr-navy);
    box-shadow: 0 2px 8px rgba(38,69,93,0.08);
  }

  .history-card.active {
    border-color: var(--lr-navy);
  }

  .history-thumb {
    width: 100%;
    height: 80px;
    background: var(--lr-sky);
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .history-thumb iframe {
    width: 400%;
    height: 400%;
    transform: scale(0.25);
    transform-origin: top left;
    border: none;
    pointer-events: none;
  }

  .history-thumb-empty {
    font-size: 24px;
    color: var(--lr-mist);
  }

  .history-info {
    padding: 8px 12px;
  }

  .history-title {
    font-size: 12px;
    font-weight: 500;
    color: var(--lr-navy);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }

  .history-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .history-date {
    font-size: 10px;
    color: var(--muted);
  }

  .history-versions {
    font-size: 10px;
    color: var(--lr-slate);
    background: var(--lr-sky);
    padding: 1px 6px;
    border-radius: 10px;
  }

  .history-empty {
    text-align: center;
    padding: 20px;
    color: var(--muted);
    font-size: 12px;
  }

  .btn-clear-history {
    background: none;
    border: none;
    font-size: 10px;
    color: var(--muted);
    cursor: pointer;
    padding: 2px 4px;
    font-family: 'DM Sans', sans-serif;
  }

  .btn-clear-history:hover { color: var(--lr-red); }

</style>
</head>
<body>

<header class="header">
  <div class="header-logo">
    <div class="logo-mark">L</div>
    <div>
      <div class="logo-text">Luth Research</div>
      <div class="logo-sub">Infographic Generator</div>
    </div>
  </div>
  <div class="header-status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Ready</span>
  </div>
</header>

<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">

    <!-- Sheet rows -->
    <div class="sheet-header">
      <div class="section-label" style="margin:0">Content Queue</div>
      <button class="btn-refresh" onclick="loadSheet()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
        Refresh
      </button>
    </div>
    <div class="polling-bar active" id="pollingBar"></div>
    <br>
    <div class="row-list" id="rowList">
      <div class="empty-state">Loading your sheet...</div>
    </div>

    <!-- Content History -->

<script>

// Toast
function showToast(msg, type='') {
  const t = document.getElementById('toast');

}

// Status

// Load sheet via CSV export (avoids CORS issues)
async function loadSheet() {
  const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTJ3dcUzGe6EypyXkTZT4FkJBgJLY4WtFj_OY3itt9fihSRixqkBEYU2NFblxNTkjYL__30PFMnZBRZ/pub?gid=0&single=true&output=csv';
  const url = sheetUrl;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const rows = parseCSV(text);
    if (rows.length < 2) throw new Error('No data found');

    const headers = rows[0];
    sheetData = rows.slice(1).map((row, i) => {
      const obj = { _rowIndex: i + 2 };
      headers.forEach((h, ci) => {
        obj[h.trim()] = (row[ci] || '').trim();
      });
      return obj;
    }).filter(r => r['Title']);

    // Detect new rows
    const newCount = sheetData.length;
    if (knownRowCount > 0 && newCount > knownRowCount) {
      showToast(`${newCount - knownRowCount} new row(s) detected!`);
    }
    knownRowCount = newCount;

    renderRows();
    setStatus('Sheet synced');
  } catch(e) {
    document.getElementById('rowList').innerHTML = `<div class="empty-state">Could not load sheet.<br><small>${e.message}</small><br><br>Make sure your sheet is shared as "Anyone with the link can view".</div>`;
    setStatus('Sheet error', false);
  }
}

// Simple CSV parser that handles quoted fields
function parseCSV(text) {
  const rows = [];
  const lines = text.split('\n');
  for (const line of lines) {
    if (!line.trim()) continue;
    const cols = [];
    let cur = '';
    let inQuote = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQuote && line[i+1] === '"') { cur += '"'; i++; }
        else inQuote = !inQuote;
      } else if (ch === ',' && !inQuote) {
        cols.push(cur); cur = '';
      } else {
        cur += ch;
      }
    }
    cols.push(cur);
    rows.push(cols);
  }
  return rows;
}

function renderRows() {
  const list = document.getElementById('rowList');
  if (!sheetData.length) {
    list.innerHTML = '<div class="empty-state">No rows found in sheet.</div>';

  list.innerHTML = sheetData.map((row, i) => {
    const status = (row['Ready for Creation'] || row['Column D'] || '').toString().toUpperCase();

        <div class="row-desc">${row['Description'] || ''}</div>
        <div class="row-meta">${badgeHtml}</div>
      </div>`;
  }).join('');
}

function saveSession() {
  if (!selectedRow) return;
  const key = 'lr_session_' + (selectedRow['Title'] || 'untitled').replace(/\s+/g, '_');
  const session = {
    conversationHistory: conversationHistory.map(m => ({
      role: m.role,
      content: m.content,
      displayText: m.displayText,
      thinking: m.thinking,
      versionIndex: m.versionIndex,
      time: m.time,
      rawResponse: m.rawResponse
    })),
    versionHistory: versionHistory.map(v => ({
      html: v.html,
      thinking: v.thinking,
      timestamp: v.timestamp
    })),
    activeVersion,
    rowTitle: selectedRow['Title']
  };
  try {
    localStorage.setItem(key, JSON.stringify(session));
  } catch(e) {
    // localStorage full — clear oldest sessions
    const keys = Object.keys(localStorage).filter(k => k.startsWith('lr_session_'));
    if (keys.length > 0) {
      localStorage.removeItem(keys[0]);
      localStorage.setItem(key, JSON.stringify(session));
    }
  }
}

function restoreSession(row) {
  const key = 'lr_session_' + (row['Title'] || 'untitled').replace(/\s+/g, '_');
  try {
    const saved = localStorage.getItem(key);
    if (saved) {
      const session = JSON.parse(saved);
      conversationHistory = session.conversationHistory || [];
      versionHistory = session.versionHistory || [];
      activeVersion = session.activeVersion ?? -1;
      generatedHTML = activeVersion >= 0 && versionHistory[activeVersion]
        ? versionHistory[activeVersion].html : null;
      return true;
    }
  } catch(e) {}
  return false;
}

function selectRow(i) {
  selectedRow = sheetData[i];
  // Try to restore previous session for this row
  const restored = restoreSession(selectedRow);
  if (!restored) {
    conversationHistory = [];
    versionHistory = [];
    activeVersion = -1;
    generatedHTML = null;
  }
  document.querySelectorAll('.row-card').forEach((el, idx) => {
    el.classList.toggle('selected', idx === i);
  });
  renderMain();
  if (restored && generatedHTML) {
    showToast('Previous session restored — ' + versionHistory.length + ' version(s) loaded');
  }
}

function renderMain() {
  if (!selectedRow) return;
  const row = selectedRow;
  const status = (row['Ready for Creation'] || '').toString().toUpperCase();

  const isApproved = (row['Approved'] || '').toString().toUpperCase() === 'YES';

  const versionsHtml = versionHistory.length > 0 ? `

      <div class="version-chips">
        ${versionHistory.map((v, i) => `
          <span class="version-chip ${i === activeVersion ? 'active' : ''}" onclick="loadVersion(${i})">
            v${i + 1}
          </span>`).join('')}
      </div>

  document.getElementById('mainArea').innerHTML = `

          </div>
          <div class="action-row">
            ${isRun && versionHistory.length === 0 ? `<button class="btn btn-primary" onclick="startGeneration()" id="generateBtn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
              Generate
            </button>` : ''}
            ${generatedHTML ? `
              <button class="btn btn-outline" onclick="downloadPNG()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Download
              </button>
              <button class="btn btn-success" onclick="approveInfographic()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                Approve
              </button>
            ` : ''}
          </div>
        </div>

        <div class="content-details">
          <div class="detail-item">
            <label>Target Audience</label>
            <p>${row['Target Audience'] || '—'}</p>
          </div>
          <div class="detail-item">
            <label>Source</label>
            <p>${row['Source'] || '—'}</p>
          </div>
          <div class="detail-item full">
            <label>Key Stats</label>
            <p>${row['Key Stats'] || '—'}</p>
          </div>
          <div class="detail-item full">

      <div class="chat-panel">
        <div class="chat-header">

            <textarea class="chat-textarea" id="chatInput" placeholder="${versionHistory.length === 0 ? 'Generate your first infographic...' : 'Ask for changes, e.g. make the headline bolder...'}" rows="1" onkeydown="handleChatKey(event)"></textarea>
            <button class="chat-send-btn" onclick="sendChatMessage()" id="chatSendBtn" title="Send">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>

function renderChatMessages() {
  if (conversationHistory.length === 0) {
    return `<div class="chat-empty">
      <div class="chat-empty-icon">💬</div>
      <div class="chat-empty-title">Start the conversation</div>
      <div class="chat-empty-sub">Generate your first infographic or type a message to get started. Claude will remember every version.</div>
    </div>`;
  }

  return conversationHistory.map((msg, i) => {
    if (msg.role === 'user') {
      return `<div class="chat-msg chat-msg-user">
        <div class="chat-bubble chat-bubble-user">${escapeDisplay(msg.displayText || msg.content)}</div>
        <div class="chat-msg-meta">${msg.time || ''}</div>
      </div>`;
    } else {
      const vIdx = msg.versionIndex;
      return `<div class="chat-msg chat-msg-claude">
        <div class="chat-bubble chat-bubble-claude">${escapeDisplay(msg.thinking || 'Generating...')}</div>
        ${vIdx !== undefined ? `<span class="chat-version-pill ${vIdx === activeVersion ? 'active' : ''}" onclick="loadVersion(${vIdx})">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
          View v${vIdx + 1}
        </span>` : ''}
        <div class="chat-msg-meta">${msg.time || ''}</div>
      </div>`;
    }
  }).join('');
}

function escapeDisplay(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function scrollChatToBottom() {
  const el = document.getElementById('chatMessages');
  if (el) el.scrollTop = el.scrollHeight;
}

function addTypingIndicator() {
  const el = document.getElementById('chatMessages');
  if (!el) return;
  const div = document.createElement('div');
  div.className = 'chat-msg chat-msg-claude';
  div.id = 'typingIndicator';
  div.innerHTML = `<div class="chat-bubble chat-bubble-claude">
    <div class="typing-indicator">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
  </div>`;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function removeTypingIndicator() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function loadVersion(idx) {
  if (idx < 0 || idx >= versionHistory.length) return;
  activeVersion = idx;
  generatedHTML = versionHistory[idx].html;
  const frame = document.getElementById('previewFrame');
  if (frame) {
    const scale = frame.offsetWidth / 1200;
    frame.style.setProperty('--preview-scale', scale);
    frame.innerHTML = `<iframe srcdoc="${escapeHtml(generatedHTML)}" style="width:1200px;height:627px;border:none;position:absolute;top:0;left:0;transform:scale(${scale});transform-origin:top left;"></iframe>`;
  }
  // Update version chips
  document.querySelectorAll('.version-chip').forEach((chip, i) => {
    chip.classList.toggle('active', i === idx);
  });
  // Update version pills in chat
  document.querySelectorAll('.chat-version-pill').forEach(pill => {
    const pillIdx = parseInt(pill.getAttribute('onclick').match(/\d+/)[0]);
    pill.classList.toggle('active', pillIdx === idx);
  });
  // Update version nav header count
  const countEl = document.querySelector('.chat-version-count');
  if (countEl) countEl.textContent = `${versionHistory.length} version${versionHistory.length > 1 ? 's' : ''}`;
}

function handleChatKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendChatMessage();
  }
}

function startGeneration() {
  sendChatMessage('Generate an infographic based on the content brief.');
}

function escapeHtml(html) {
  return html.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function buildSystemPrompt() {
  const row = selectedRow;
  return `You are a visual designer and creative collaborator for Luth Research, a consumer intelligence company.

You are working with the user to design a LinkedIn infographic. You have memory of all previous versions in this conversation.

Content brief:
Title: ${row['Title'] || ''}
Description: ${row['Description'] || ''}
Key Stats: ${row['Key Stats'] || ''}
Target Audience: ${row['Target Audience'] || ''}
Core Insight: ${row['Core Insight'] || ''}
Source: ${row['Source'] || 'Luth Research — luthresearch.com'}

Brand guidelines:
- Colors: #26455D (dark blue), #9D2D3F (red), #96B2B8 (blue-grey), #DEEBF5 (light blue background), #4B616D (medium blue)
- Primary font: Helvetica, Arial, sans-serif (body text, labels, captions, data points)
- Secondary font: Zilla Slab (headings and titles only) — load via Google Fonts in the HTML head: <link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@400;600;700&display=swap" rel="stylesheet">
- Always include the Google Fonts link tag in the generated HTML head section
- Style: Clean, professional, data-driven, B2B
- Include Luth Research branding visibly
- Use circles and rounded shapes — avoid purely boxy layouts
- Use at least 3 brand colors throughout

Technical rules — follow exactly:
- Canvas must be exactly 1200x627px
- External fonts are allowed via Google Fonts only — always load Zilla Slab for headings
- No JavaScript, no animations, no CSS transitions
- All content visible immediately on page load
- Single embedded style block only
- All elements within 1200x627px container
- Static CSS only

RESPONSE FORMAT — always respond in two parts:
1. THINKING: One to three sentences explaining what you are doing and why — your design reasoning in plain English
2. HTML: The complete infographic HTML

Format your response exactly like this:
THINKING: [your reasoning here]
HTML: [complete <!DOCTYPE html> code here]

When the user asks to go back to a previous version, reproduce that version's HTML exactly.
When the user asks to keep something the same, preserve it precisely and only change what they ask.`;
}

async function sendChatMessage(overrideText) {
  if (!selectedRow) return;
  const apiKey = ''; // API key handled server-side via Vercel env var

  const inputEl = document.getElementById('chatInput');
  const userText = overrideText || (inputEl ? inputEl.value.trim() : '');
  if (!userText) return;

  const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  // Add user message to conversation
  conversationHistory.push({
    role: 'user',
    content: userText,
    displayText: userText,
    time: now
  });

  if (inputEl) inputEl.value = '';
  setStatus('Generating...', false);

  // Show user message and typing indicator
  const chatEl = document.getElementById('chatMessages');
  if (chatEl) {
    chatEl.innerHTML = renderChatMessages();
    scrollChatToBottom();
  }
  addTypingIndicator();

  // Show loading in preview
  const previewFrame = document.getElementById('previewFrame');
  if (previewFrame) {
    previewFrame.innerHTML = `<div class="preview-loading"><div class="spinner"></div><p>Claude is designing...</p></div>`;
  }

  // Build messages array for API — include full history
  const messages = conversationHistory
    .filter(m => m.role === 'user' || m.role === 'assistant')
    .map(m => ({
      role: m.role,
      content: m.role === 'user' ? m.content : m.rawResponse || m.content
    }));

  try {
    const response = await fetch('/api/generate', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 4000,
        system: buildSystemPrompt(),
        messages
      })
    });

    const data = await response.json();
    if (!response.ok) throw new Error(data.error?.message || 'API error');

    const rawResponse = data.content[0].text;

    // Parse THINKING and HTML from response
    let thinking = '';
    let html = '';

    const thinkingMatch = rawResponse.match(/THINKING:\s*([\s\S]*?)(?=HTML:|$)/i);
    const htmlMatch = rawResponse.match(/HTML:\s*([\s\S]*)/i);

    if (thinkingMatch) thinking = thinkingMatch[1].trim();
    if (htmlMatch) {
      html = htmlMatch[1].trim()
        .replace(/^```html\n?/i, '')
        .replace(/^```\n?/i, '')
        .replace(/```$/i, '')
        .trim();
    }

    // Fallback if format not followed
    if (!html) {
      html = rawResponse.replace(/^```html\n?/i, '').replace(/^```\n?/i, '').replace(/```$/i, '').trim();
      thinking = 'Here is the updated infographic.';
    }

    // Save version
    const versionIdx = versionHistory.length;
    versionHistory.push({ html, thinking, timestamp: now });
    activeVersion = versionIdx;
    generatedHTML = html;

    // Add assistant message to history
    conversationHistory.push({
      role: 'assistant',
      content: thinking,
      rawResponse,
      thinking,
      versionIndex: versionIdx,
      time: now
    });

    // Persist session to localStorage
    saveSession();
    // Save to content history
    saveToHistory(selectedRow, versionHistory);

    // Update UI
    removeTypingIndicator();
    if (chatEl) {
      chatEl.innerHTML = renderChatMessages();
      scrollChatToBottom();
    }

    // Update preview
    if (previewFrame) {
      previewFrame.innerHTML = `<iframe class="preview-iframe" style="height:627px" srcdoc="${escapeHtml(html)}"></iframe>`;
    }

    // Update version nav
    const versionNav = document.querySelector('.version-nav');
    if (!versionNav) {
      const previewPanel = document.querySelector('.preview-panel');
      if (previewPanel) {
        const navDiv = document.createElement('div');
        navDiv.className = 'version-nav';
        navDiv.innerHTML = `<span class="version-nav-label">Versions:</span>
          <div class="version-chips">
            ${versionHistory.map((v, i) => `<span class="version-chip ${i === activeVersion ? 'active' : ''}" onclick="loadVersion(${i})">v${i + 1}</span>`).join('')}
          </div>`;
        previewFrame.insertAdjacentElement('beforebegin', navDiv);
      }
    } else {
      versionNav.innerHTML = `<span class="version-nav-label">Versions:</span>
        <div class="version-chips">
          ${versionHistory.map((v, i) => `<span class="version-chip ${i === activeVersion ? 'active' : ''}" onclick="loadVersion(${i})">v${i + 1}</span>`).join('')}
        </div>`;
    }

    // Update action buttons
    const actionRow = document.querySelector('.action-row');
    if (actionRow) {
      actionRow.innerHTML = `
        <button class="btn btn-outline" onclick="downloadPNG()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download
        </button>
        <button class="btn btn-success" onclick="approveInfographic()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
          Approve
        </button>`;
    }

    // Update chat hint
    const hint = document.querySelector('.chat-hint');
    if (hint) hint.textContent = 'Claude remembers all previous versions. Ask to go back to v1, v2, etc.';

    const versionCountEl = document.querySelector('.chat-version-count');
    if (versionCountEl) {
      versionCountEl.textContent = `${versionHistory.length} version${versionHistory.length > 1 ? 's' : ''}`;
    } else {
      const chatHeader = document.querySelector('.chat-header');
      if (chatHeader) {
        const span = document.createElement('span');
        span.className = 'chat-version-count';
        span.textContent = `${versionHistory.length} version${versionHistory.length > 1 ? 's' : ''}`;
        chatHeader.appendChild(span);
      }
    }

    setStatus('Generated successfully');
    showToast(`Version ${versionIdx + 1} ready`);

  } catch(e) {
    removeTypingIndicator();
    if (previewFrame) {
      previewFrame.innerHTML = `<div class="preview-loading"><p style="color:#9D2D3F">Error: ${e.message}</p></div>`;
    }
    // Remove failed user message from history
    conversationHistory.pop();
    if (chatEl) chatEl.innerHTML = renderChatMessages();
    setStatus('Error', false);
    showToast('Generation failed: ' + e.message, 'error');
  }
}

async function regenerateWithFeedback() {
  generatedHTML = null;
  await sendChatMessage();
}

function approveInfographic() {
  if (!generatedHTML) return;
  showToast(`✓ Approved! Notification sent to ${NOTIFY_EMAIL}. Ready for HubSpot upload.`);
  
  // In a full version this would: 
  // 1. Call an email API to notify lhazel@luthresearch.com
  // 2. Push to HubSpot Files API

  selectedRow['Approved'] = 'YES';
  renderMain();
  renderRows();
}

function downloadPNG() {
  if (!generatedHTML) return;

  // Get the actual displayed width of the preview frame
  const frame = document.getElementById('previewFrame');
  const displayWidth = frame ? frame.offsetWidth : 900;
  const displayHeight = Math.round(displayWidth * 627 / 1200);

  // Wrap the infographic HTML in a page sized to match the display
  const wrappedHTML = `<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: ${displayWidth}px; height: ${displayHeight}px; overflow: hidden; background: #F8FAFB; }
  .scale-wrap { width: 1200px; height: 627px; transform: scale(${displayWidth/1200}); transform-origin: top left; }
</style>
</head>
<body>
<div class="scale-wrap">
${generatedHTML}
</div>
</body>
</html>`;

  const blob = new Blob([wrappedHTML], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (selectedRow?.['Title'] || 'infographic').replace(/\s+/g,'_') + '_' + new Date().toISOString().split('T')[0] + '.html';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Downloaded! Open in browser — it matches exactly what you see in the app.');
}


// ============================================================
// CONTENT HISTORY
// ============================================================

function getAllHistory() {
  try {
    const raw = localStorage.getItem('lr_content_history');
    return raw ? JSON.parse(raw) : [];
  } catch(e) { return []; }
}

function saveToHistory(row, versions) {
  const history = getAllHistory();
  const key = (row['Title'] || 'untitled').replace(/\s+/g, '_');
  const existing = history.findIndex(h => h.key === key);
  const entry = {
    key,
    title: row['Title'] || 'Untitled',
    description: row['Description'] || '',
    savedAt: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }),
    versionCount: versions.length,
    latestHTML: versions[versions.length - 1]?.html || '',
    versions: versions.map(v => ({ html: v.html, thinking: v.thinking, timestamp: v.timestamp }))
  };
  if (existing >= 0) {
    history[existing] = entry;
  } else {
    history.unshift(entry);
  }
  // Keep max 20 items
  if (history.length > 20) history.pop();
  try {
    localStorage.setItem('lr_content_history', JSON.stringify(history));
  } catch(e) {
    // Storage full — remove oldest
    history.pop();
    localStorage.setItem('lr_content_history', JSON.stringify(history));
  }
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('historyList');
  if (!list) return;
  const history = getAllHistory();
  if (history.length === 0) {
    list.innerHTML = '<div class="history-empty">No history yet. Generated infographics will appear here.</div>';
    return;
  }
  list.innerHTML = history.map((entry, i) => {
    const isActive = selectedRow && (selectedRow['Title'] || '').replace(/\s+/g, '_') === entry.key;
    return `<div class="history-card ${isActive ? 'active' : ''}" onclick="loadFromHistory(${i})">
      <div class="history-thumb">
        ${entry.latestHTML
          ? `<iframe srcdoc="${entry.latestHTML.replace(/"/g, '&quot;').replace(/'/g, '&#39;')}"></iframe>`
          : '<div class="history-thumb-empty">🖼</div>'}
      </div>
      <div class="history-info">
        <div class="history-title">${entry.title}</div>
        <div class="history-meta">
          <span class="history-date">${entry.savedAt}</span>
          <span class="history-versions">${entry.versionCount} version${entry.versionCount !== 1 ? 's' : ''}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function loadFromHistory(idx) {
  const history = getAllHistory();
  const entry = history[idx];
  if (!entry) return;

  // Restore version history
  versionHistory = entry.versions || [];
  activeVersion = versionHistory.length - 1;
  generatedHTML = activeVersion >= 0 ? versionHistory[activeVersion].html : null;

  // Restore conversation as empty but show versions
  conversationHistory = versionHistory.map((v, i) => ({
    role: 'assistant',
    content: v.thinking || '',
    thinking: v.thinking || '',
    rawResponse: v.html,
    versionIndex: i,
    time: v.timestamp || ''
  }));

  // Find matching row in sheet or create a stub
  const matchingRow = sheetData.find(r => (r['Title'] || '').replace(/\s+/g, '_') === entry.key);
  if (matchingRow) {
    selectedRow = matchingRow;
  } else {
    selectedRow = { Title: entry.title, Description: entry.description };
  }

  renderMain();
  renderHistory();
  showToast('Loaded: ' + entry.title);
}

function clearHistory() {
  if (!confirm('Clear all content history? This cannot be undone.')) return;
  localStorage.removeItem('lr_content_history');
  renderHistory();
  showToast('History cleared');
}

// Poll for new rows every 60 seconds
function startPolling() {
  loadSheet();
  pollInterval = setInterval(() => {
    loadSheet();
  }, 60000);
}

startPolling();
</script>
